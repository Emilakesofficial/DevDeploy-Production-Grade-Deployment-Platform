version: '3.9'

services:
  # Redis Cache & Broker
  redis:
    image: redis:7-alpine
    container_name: financial_auth_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - auth_network

  # Django Web Application
  web:
    build: ./app
    container_name: financial_auth_web
    # Reduced workers for t3.micro
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 2 --timeout 60
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
      - logs_volume:/app/logs
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST}
      - REDIS_HOST=redis
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/auth/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - auth_network

  # Celery Worker
  celery_worker:
    build: ./app
    container_name: financial_auth_celery_worker
    command: celery -A core worker --loglevel=info
    volumes:
      - logs_volume:/app/logs
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST}
      - REDIS_HOST=redis
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - auth_network

  # Celery Beat (Scheduler)
  celery_beat:
    build: ./app
    container_name: financial_auth_celery_beat
    command: celery -A core beat --loglevel=info
    volumes:
      - logs_volume:/app/logs
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST}
      - REDIS_HOST=redis
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - auth_network

  # Celery Flower (Monitoring)
  flower:
    build: ./app
    container_name: financial_auth_flower
    command: celery -A core flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST}
      - REDIS_HOST=redis
    depends_on:
      - redis
      - celery_worker
    restart: unless-stopped
    networks:
      - auth_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: financial_auth_nginx
    ports:
      - "80:80"
    volumes:
      - ./app/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/mediafiles:ro
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - auth_network

volumes:
  redis_data:
  static_volume:
  media_volume:
  logs_volume:

networks:
  auth_network:
    driver: bridge