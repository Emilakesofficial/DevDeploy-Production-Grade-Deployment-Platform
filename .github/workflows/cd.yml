name: CD - Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate runtime .env from GitHub Secrets
          env:
            DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
            EC2_PUBLIC_IP: ${{ secrets.EC2_PUBLIC_IP }}
            DB_NAME: ${{ secrets.DB_NAME }}
            DB_USER: ${{ secrets.DB_USER }}
            DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
            DB_HOST: ${{ secrets.DB_HOST }}
            EMAIL_BACKEND: ${{ secrets.EMAIL_BACKEND }}
            EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
            EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
            EMAIL_USE_TLS: ${{ secrets.EMAIL_USE_TLS }}
            EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
            EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_HOST_PASSWORD }}
            DEFAULT_FROM_EMAIL: ${{ secrets.DEFAULT_FROM_EMAIL }}
            JWT_ACCESS_TOKEN_LIFETIME_MINUTES: ${{ secrets.JWT_ACCESS_TOKEN_LIFETIME_MINUTES }}
            JWT_REFRESH_TOKEN_LIFETIME_DAYS: ${{ secrets.JWT_REFRESH_TOKEN_LIFETIME_DAYS }}
            MAX_LOGIN_ATTEMPTS: ${{ secrets.MAX_LOGIN_ATTEMPTS }}
            LOGIN_LOCKOUT_DURATION_MINUTES: ${{ secrets.LOGIN_LOCKOUT_DURATION_MINUTES }}
            FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          run: |
            # Helper: wrap value in single quotes, escaping any ' in the value
            q() { printf "'%s'" "$(printf '%s' "$1" | sed "s/'/'\\\\''/g")"; }
            {
              echo "# AUTO-GENERATED .env - DO NOT EDIT OR COMMIT"
              echo "DJANGO_SECRET_KEY=$(q "$DJANGO_SECRET_KEY")"
              echo "DJANGO_DEBUG=False"
              echo "DJANGO_ALLOWED_HOSTS=$(q "${EC2_PUBLIC_IP},localhost,127.0.0.1")"
              echo ""
              echo "DB_NAME=$(q "$DB_NAME")"
              echo "DB_USER=$(q "$DB_USER")"
              echo "DB_PASSWORD=$(q "$DB_PASSWORD")"
              echo "DB_HOST=$(q "$DB_HOST")"
              echo "DB_PORT=5432"
              # ... same pattern for all other secrets
              echo "FRONTEND_URL=$(q "$FRONTEND_URL")"
            } > .env


      - name: Prepare target directory on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            sudo mkdir -p /opt/devdeploy
            sudo chown -R ec2-user:ec2-user /opt/devdeploy
            echo "Directory prepared"

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: ".,.env,docker-compose.prod.yml,scripts/,app/"
          target: /opt/devdeploy
          strip_components: 0

      - name: Deploy on EC2 (aggressive normalization)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd /opt/devdeploy

            echo "=== [1] Ultra aggressive line ending cleanup ==="
            
            # Fix the deploy script itself first (very important)
            if [ -f "scripts/deploy.sh" ]; then
              tr -d '\r' < scripts/deploy.sh > scripts/deploy.sh.clean
              mv scripts/deploy.sh.clean scripts/deploy.sh
            fi

            # Fix all other critical files
            for f in .env docker-compose.prod.yml scripts/healthcheck.sh; do
              if [ -f "$f" ]; then
                tr -d '\r' < "$f" > "${f}.clean"
                mv "${f}.clean" "$f"
              fi
            done

            echo "=== [2] Making scripts executable ==="
            chmod +x scripts/deploy.sh scripts/healthcheck.sh

            echo "=== [3] Running deploy.sh ==="
            ./scripts/deploy.sh

      - name: Run health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd /opt/devdeploy
            ./scripts/healthcheck.sh