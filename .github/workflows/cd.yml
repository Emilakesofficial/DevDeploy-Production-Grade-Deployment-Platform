name: CD - Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate runtime .env from GitHub Secrets
        run: |
          {
            echo "# ============================================================================="
            echo "# AUTO-GENERATED .env - DO NOT EDIT OR COMMIT"
            echo "# Generated by GitHub Actions on $(date)"
            echo "# ============================================================================="
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}"
            echo "DEBUG=False"
            echo "ALLOWED_HOSTS=${{ secrets.EC2_PUBLIC_IP }},localhost,127.0.0.1"
            echo ""
            echo "# Database - Amazon RDS"
            echo "DB_NAME=${{ secrets.DB_NAME }}"
            echo "DB_USER=${{ secrets.DB_USER }}"
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}"
            echo "DB_HOST=${{ secrets.DB_HOST }}"
            echo "DB_PORT=5432"
            echo ""
            echo "# Redis (internal Docker network)"
            echo "REDIS_HOST=redis"
            echo "REDIS_PORT=6379"
            echo ""
            echo "# Celery"
            echo "CELERY_BROKER_URL=redis://redis:6379/0"
            echo "CELERY_RESULT_BACKEND=redis://redis:6379/0"
            echo ""
            echo "# Email (Gmail SMTP)"
            echo "EMAIL_BACKEND=${{ secrets.EMAIL_BACKEND }}"
            echo "EMAIL_HOST=${{ secrets.EMAIL_HOST }}"
            echo "EMAIL_PORT=${{ secrets.EMAIL_PORT }}"
            echo "EMAIL_USE_TLS=${{ secrets.EMAIL_USE_TLS }}"
            echo "EMAIL_HOST_USER=${{ secrets.EMAIL_HOST_USER }}"
            echo "EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}"
            echo "DEFAULT_FROM_EMAIL=${{ secrets.DEFAULT_FROM_EMAIL }}"

            # JWT
            echo "JWT_ACCESS_TOKEN_LIFETIME_MINUTES=${{ secrets.JWT_ACCESS_TOKEN_LIFETIME_MINUTES }}"
            echo "JWT_REFRESH_TOKEN_LIFETIME_DAYS=${{ secrets.JWT_REFRESH_TOKEN_LIFETIME_DAYS }}"
            # Security
            echo "MAX_LOGIN_ATTEMPTS=${{ secrets.MAX_LOGIN_ATTEMPTS }}"
            echo "LOGIN_LOCKOUT_DURATION_MINUTES=${{ secrets.LOGIN_LOCKOUT_DURATION_MINUTES }}"
            echo "FRONTEND_URL=${{ secrets.FRONTEND_URL }}"
          } > .env

      - name: Prepare target directory on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            sudo mkdir -p /opt/devdeploy
            sudo chown -R ec2-user:ec2-user /opt/devdeploy
            echo "Directory prepared"

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: ".,.env,docker-compose.prod.yml,scripts/,app/"
          target: /opt/devdeploy
          strip_components: 0

      - name: Deploy on EC2 (aggressive normalization)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd /opt/devdeploy

            echo "=== [1] Ultra aggressive line ending cleanup ==="
            
            # Fix the deploy script itself first (very important)
            if [ -f "scripts/deploy.sh" ]; then
              tr -d '\r' < scripts/deploy.sh > scripts/deploy.sh.clean
              mv scripts/deploy.sh.clean scripts/deploy.sh
            fi

            # Fix all other critical files
            for f in .env docker-compose.prod.yml scripts/healthcheck.sh; do
              if [ -f "$f" ]; then
                tr -d '\r' < "$f" > "${f}.clean"
                mv "${f}.clean" "$f"
              fi
            done

            echo "=== [2] Making scripts executable ==="
            chmod +x scripts/deploy.sh scripts/healthcheck.sh

            echo "=== [3] Running deploy.sh ==="
            ./scripts/deploy.sh

      - name: Run health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd /opt/devdeploy
            ./scripts/healthcheck.sh